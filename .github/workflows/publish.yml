name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate tag matches crate version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=$(python3 -c 'from pathlib import Path; import re, sys; content = Path("Cargo.toml").read_text(encoding="utf-8"); match = re.search(r"^version = \"([^\"]+)\"$", content, re.MULTILINE); print(match.group(1)) if match else sys.exit("Could not parse version from Cargo.toml")')
          EXPECTED_TAG="v$VERSION"

          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag/crate version mismatch: got $TAG_NAME, expected $EXPECTED_TAG"
            exit 1
          fi

      - run: cargo publish --locked --dry-run

      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
